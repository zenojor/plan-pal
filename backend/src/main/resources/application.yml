server:
  port: 8081

spring:
  application:
    name: weekend-planner-backend

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
          temperature: 0.7
          max-tokens: 4096

# Agent 配置
agent:
  max-steps: 20                 # ReAct 最大迭代步数 (安全熔断)
  max-replan-attempts: 3        # 最大重规划尝试次数
  default-radius-km: 3          # 默认检索半径
  max-radius-km: 5              # 最大检索半径(降级)
  default-duration-hours: 5     # 默认活动时长
  queue-threshold-minutes: 30   # 排队阈值(超过触发重规划)
  time-budget-hours: 6          # 总时间预算上限

  # 宏时间片配置 (分钟)
  time-slices:
    activity: 120      # 户外/室内活动: 2小时
    transit: 30        # 交通缓冲: 30分钟
    dining: 120        # 餐饮: 2小时
    evening: 90        # 夜间轻度活动: 1.5小时

  debug:
    log-llm-output: true
    llm-output-preview-length: 2000

  fast:
    deadline-ms: 25000          # FastPlan 总时间预算，给前端流式渲染预留余量
    tool-timeout-ms: 3000       # 单个工具响应目标
    max-checks-per-category: 3  # 每类最多检查候选数，避免无限循环

  llm-finalizer:
    enabled: false              # 默认用模板文案；需要时可开启一次性 LLM 润色

  intent:
    llm-enabled: true           # 先尝试一次 LLM 结构化理解，失败则规则兜底
    timeout-ms: 30000

logging:
  level:
    com.weekendplanner: DEBUG
    org.springframework.ai: DEBUG

planner:
  poi:
    provider: ${PLANNER_POI_PROVIDER:sandbox}
  weather:
    provider: ${PLANNER_WEATHER_PROVIDER:sandbox}
    mock:
      enabled: true
      default-risk: ${PLANNER_WEATHER_MOCK_DEFAULT_RISK:AUTO}
  default:
    city: ${PLANNER_DEFAULT_CITY:上海}
    location: ${PLANNER_DEFAULT_LOCATION:121.4737,31.2304}
