server:
  port: 8081

spring:
  application:
    name: weekend-planner-backend

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-v4-pro}
          temperature: 0.7
          max-tokens: 4096

# Agent 配置
agent:
  max-steps: 15                 # ReAct 最大迭代步数 (安全熔断)
  max-replan-attempts: 3        # 最大重规划尝试次数
  default-radius-km: 3          # 默认检索半径
  max-radius-km: 5              # 最大检索半径(降级)
  default-duration-hours: 5     # 默认活动时长
  queue-threshold-minutes: 30   # 排队阈值(超过触发重规划)
  time-budget-hours: 6          # 总时间预算上限

  # 宏时间片配置 (分钟)
  time-slices:
    activity: 120      # 户外/室内活动: 2小时
    transit: 30        # 交通缓冲: 30分钟
    dining: 120        # 餐饮: 2小时
    evening: 90        # 夜间轻度活动: 1.5小时

  debug:
    log-llm-output: true
    llm-output-preview-length: 2000

logging:
  level:
    com.weekendplanner: DEBUG
    org.springframework.ai: DEBUG
